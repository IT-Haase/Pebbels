# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx12g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8

# AndroidX is mandatory on modern projects
android.useAndroidX=true
android.nonTransitiveRClass=true

# Kotlin code style
kotlin.code.style=official

# Faster parallel builds
org.gradle.parallel=true
org.gradle.caching=true

# compileSdk 35 mit AGP 8.5.2 zulassen (nur Warnung unterdrücken)
android.suppressUnsupportedCompileSdk=35

# KMP <-> AGP-8.5-Kompatibilitätswarnung stilllegen (:shared-Modul)
kotlin.mpp.androidGradlePluginCompatibility.nowarn=true
